<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AnixIOS — Детали аниме</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://kinobox.tv/api/player.js"></script>
</head>
<body class="bg-black text-white font-sans min-h-screen">

  <header class="glass-card-strong sticky top-0 z-30 border-b border-zinc-800">
    <div class="max-w-6xl mx-auto flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4 px-4 py-4">
      <div class="space-y-2">
        <div class="flex flex-wrap items-center gap-3">
          <a href="index.html" class="text-sm text-zinc-400 hover:text-white">← Вернуться в каталог</a>
          <a href="favorites.html" class="rounded-full border border-indigo-500/20 bg-indigo-500/10 px-4 py-2 text-sm text-indigo-200 hover:bg-indigo-500/20 transition">Избранное</a>
        </div>
        <h1 class="text-4xl font-extrabold text-white">AnixIOS</h1>
        <p class="text-sm text-zinc-400">Премиум-страница аниме с онлайн-просмотром.</p>
      </div>
    </div>
  </header>

  <main class="max-w-6xl mx-auto px-4 py-8 space-y-8">
    
    <div id="anime-detail-container">
        <div class="text-center text-zinc-500 py-10 animate-pulse">Загрузка подробностей...</div>
    </div>

    <section class="bg-zinc-950 border border-zinc-900 rounded-[2rem] p-6 shadow-2xl">
        <h2 class="text-xl font-bold text-white mb-4 flex items-center gap-2">
            <span class="inline-block w-2.5 h-2.5 rounded-full bg-indigo-500 animate-pulse"></span>
            Смотреть онлайн (Мультиплеер)
        </h2>
        
        <div class="relative w-full aspect-video bg-black rounded-2xl overflow-hidden border border-zinc-900 shadow-inner">
            <div id="kinobox-player" class="w-full h-full"></div>
        </div>
        
        <p class="text-zinc-600 text-xs mt-3 text-center md:text-left">
            Плеер автоматически агрегирует потоки баз Kodik, Vibix, Alloha. Если плеер пуст, отключите AdBlock.
        </p>
    </section>
    
  </main>

  <script src="anime.js"></script>
</body>
</html>
