<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AnixIOS — Топ рейтинга</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-black text-white font-sans min-h-screen">
  <!-- Страница топ-рейтинга: навигация и быстрый доступ к избранному. -->
  <header class="glass-card-strong sticky top-0 z-30 border-b border-zinc-800">
    <div class="max-w-6xl mx-auto flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4 px-4 py-4">
      <div class="space-y-2">
        <a href="index.html" class="text-sm text-zinc-400 hover:text-white">← Вернуться в каталог</a>
        <h1 class="text-3xl font-extrabold text-white">Топ рейтинга</h1>
        <p class="text-sm text-soft">Лучшие сериалы по оценкам зрителей и профессионалов.</p>
      </div>
      <div class="flex gap-3 flex-wrap">
        <a href="favorites.html" class="rounded-2xl border border-indigo-500/20 bg-indigo-500/10 px-4 py-3 text-sm text-indigo-300 hover:bg-indigo-500/20">Избранное</a>
        <a href="index.html" class="rounded-2xl border border-zinc-700 px-4 py-3 text-sm text-zinc-200 hover:border-indigo-500 hover:text-white">Каталог</a>
      </div>
    </div>
  </header>

  <!-- Основной блок топ-рейтинга с фильтрами и результатами. -->
  <main class="max-w-6xl mx-auto px-4 py-8">
    <section class="glass-card rounded-[2rem] p-6">
      <div class="flex flex-col sm:flex-row sm:items-center sm:justify-between gap-4 mb-6">
        <div>
          <p class="card-label">Рейтинг</p>
          <h2 class="text-3xl font-semibold text-white">Топовые аниме</h2>
        </div>
        <p class="text-sm text-soft">Отфильтровано по максимальному рейтингу.</p>
      </div>
      <div class="grid gap-4 lg:grid-cols-[1fr_auto] mb-6">
        <div class="rounded-3xl border border-zinc-800 bg-zinc-950 p-4">
          <p class="text-xs uppercase tracking-[0.24em] text-accent mb-3">Жанры</p>
          <div id="genre-filter-list" class="flex flex-wrap gap-3"></div>
        </div>
        <div class="rounded-3xl border border-zinc-800 bg-zinc-950 p-4">
          <p class="text-xs uppercase tracking-[0.24em] text-accent mb-3">Сезоны</p>
          <div id="season-filter-list" class="flex flex-wrap gap-3"></div>
        </div>
      </div>
      <div id="top-rated-summary" class="mb-6 text-sm text-zinc-400">Показано 0 аниме.</div>
      <div id="top-rated-list" class="grid grid-cols-1 sm:grid-cols-2 xl:grid-cols-3 gap-5"></div>
    </section>
  </main>

  <script src="top-rated.js"></script>
</body>
</html>
