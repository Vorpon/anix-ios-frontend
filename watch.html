<!doctype html>
<html lang="ru">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width,initial-scale=1" />
  <title>AnixIOS — Просмотр</title>
  <link rel="stylesheet" href="style.css">
  <script src="https://cdn.tailwindcss.com"></script>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
</head>
<body class="bg-black text-white font-sans min-h-screen">
  <!-- Хедлайн страницы просмотра: возврат назад, ссылки на каталог и избранное, а также ссылка на detail. -->
  <header class="bg-black/90 border-b border-zinc-900 sticky top-0 z-30">
    <div class="max-w-6xl mx-auto flex flex-col sm:flex-row items-start sm:items-center justify-between gap-4 px-4 py-4">
      <div class="space-y-2">
        <a href="javascript:history.back()" class="text-sm text-zinc-400 hover:text-white">← Назад</a>
        <h1 class="text-3xl font-bold text-indigo-500">AnixIOS — Просмотр</h1>
      </div>
      <div class="flex gap-3 flex-wrap">
        <a href="index.html" class="rounded-2xl border border-zinc-700 px-4 py-3 text-sm text-zinc-200 hover:border-indigo-500 hover:text-white">Каталог</a>
        <a href="favorites.html" class="rounded-2xl border border-indigo-500/20 bg-indigo-500/10 px-4 py-3 text-sm text-indigo-300 hover:bg-indigo-500/20">Избранное</a>
        <a id="detail-link" href="#" class="rounded-2xl border border-indigo-500 bg-indigo-500/10 px-4 py-3 text-sm text-indigo-300 hover:bg-indigo-500/20">Страница аниме</a>
      </div>
    </div>
  </header>

  <!-- Основная сетка страницы просмотра: слева краткая карточка аниме, справа выбор источника и плеер. -->
  <main class="max-w-6xl mx-auto px-4 py-8 space-y-8">
    <section class="gap-6 lg:grid lg:grid-cols-[320px_1fr]">
      <div id="anime-summary" class="glass-card rounded-[1.8rem] p-6"></div>
      <div class="space-y-4">
        <div class="glass-card rounded-[1.8rem] p-6">
          <div class="flex flex-col gap-3 sm:flex-row sm:items-center sm:justify-between">
            <div>
              <p class="text-xs uppercase tracking-[0.24em] text-accent mb-2">Просмотр</p>
              <h2 class="text-3xl font-semibold text-white">Выберите источник</h2>
            </div>
          </div>
          <div class="mt-5 flex flex-wrap gap-3" id="source-buttons"></div>
        </div>

        <div class="glass-card rounded-[1.8rem] overflow-hidden">
          <div class="relative bg-black">
            <video id="video-player" controls playsinline webkit-playsinline class="w-full h-[300px] bg-black object-contain"></video>
            <div id="video-loading" class="absolute inset-0 flex items-center justify-center bg-black/80 text-zinc-300 text-sm hidden">Загрузка...</div>
          </div>
          <div class="p-6 border-t border-zinc-800 text-sm text-soft">
            В этом демо проекте доступны стабильные демо-потоки. Для полноценного премиального опыта замените ссылки на рабочие HLS- или MP4-источники.
          </div>
        </div>
      </div>
    </section>
  </main>

  <script src="watch.js"></script>
</body>
</html>
