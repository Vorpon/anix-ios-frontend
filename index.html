<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AnixIOS — Кинематографичный стриминг</title>
    <link rel="stylesheet" href="style.css">
    <link rel="manifest" href="manifest.json">
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;900&display=swap" rel="stylesheet">
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://kinobox.tv/api/player.js"></script>
</head>
<body class="antialiased min-h-screen pb-12">

    <header class="sticky top-0 ios-blur z-40 border-b border-zinc-900/80 transition-all duration-300">
        <div class="max-w-7xl mx-auto flex flex-col md:flex-row gap-4 justify-between items-center px-6 py-4">
            <div class="flex items-center justify-between w-full md:w-auto">
                <div onclick="window.location.reload()" class="cursor-pointer group">
                    <h1 class="text-2xl font-black tracking-wider bg-gradient-to-r from-indigo-400 via-purple-400 to-pink-400 bg-clip-text text-transparent group-hover:opacity-80 transition-opacity">
                        AnixIOS
                    </h1>
                    <p class="text-[10px] text-zinc-500 font-medium tracking-widest uppercase mt-0.5">Premium Streaming</p>
                </div>
            </div>
            
            <div class="flex items-center gap-4 w-full md:w-auto max-w-lg">
                <div class="relative w-full md:w-80">
                    <input 
                        type="text" 
                        id="search-input"
                        placeholder="Поиск по названию аниме..." 
                        class="w-full bg-zinc-900/60 text-sm text-zinc-200 placeholder-zinc-500 pl-4 pr-10 py-2.5 rounded-xl border border-zinc-800/80 focus:outline-none focus:border-indigo-500/80 focus:ring-1 focus:ring-indigo-500/30 transition-all backdrop-blur-sm"
                    >
                    <span class="absolute right-3.5 top-3 text-zinc-500 pointer-events-none text-xs">🔍</span>
                </div>
                <a href="favorites.html" class="flex items-center gap-2 bg-zinc-900/60 hover:bg-zinc-800/60 border border-zinc-800/80 px-4 py-2.5 rounded-xl text-sm font-medium transition-all text-zinc-300 hover:text-white shrink-0">
                    <span>★</span> <span class="hidden sm:inline">Избранное</span>
                </a>
            </div>
        </div>
    </header>

    <main class="max-w-7xl mx-auto px-6 py-8">
        <div id="anime-list" class="grid grid-cols-2 sm:grid-cols-3 md:grid-cols-4 lg:grid-cols-5 xl:grid-cols-6 gap-6">
            </div>
    </main>

    <div id="player-modal" class="fixed inset-0 bg-black/95 z-50 flex flex-col hidden p-4 justify-center items-center backdrop-blur-md transition-all duration-300 opacity-0">
    <div class="w-full max-w-4xl bg-zinc-950 border border-zinc-800/60 rounded-3xl p-4 shadow-2xl relative transform scale-95 transition-all duration-300">
        
        <button id="close-player" class="absolute -top-12 right-2 md:top-4 md:-right-12 bg-zinc-900 hover:bg-zinc-800 text-zinc-400 hover:text-white w-9 h-9 rounded-full flex items-center justify-center border border-zinc-800 transition-all shadow-lg active:scale-90 z-50">
            ✕
        </button>
        
        <div class="relative w-full aspect-video bg-black rounded-2xl overflow-hidden border border-zinc-900 shadow-2xl">
            <div id="kinobox-player" class="kinobox_player w-full h-full"></div>
        </div>

        <div class="mt-3 flex flex-col sm:flex-row sm:items-center justify-between gap-2 px-1">
            <div>
                <h2 id="player-title" class="text-base font-bold text-white tracking-wide">Название релиза</h2>
                <p class="text-zinc-500 text-[11px] mt-0.5 flex items-center gap-1.5">
                    <span class="inline-block w-2 h-2 rounded-full bg-emerald-500 animate-pulse"></span>
                    Стриминг-ядро: автоматический поиск видеопотоков (Kodik, Vibix, Alloha, Collaps)
                </p>
            </div>
        </div>
        
    </div>
</div>

    <script src="app.js"></script>
</body>
</html>
